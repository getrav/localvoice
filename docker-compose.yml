services:
  whisper-stt:
    image: fedirz/faster-whisper-server:latest-cuda
    container_name: localvoice-whisper-stt
    ports:
      - "0.0.0.0:8080:8000"
    volumes:
      - whisper-models:/models
    environment:
      - WHISPER__MODEL=Systran/faster-whisper-large-v3
      - WHISPER__INFERENCE_DEVICE=cuda
      - WHISPER__COMPUTE_TYPE=float16
      - WHISPER__BATCH_SIZE=16
      - WHISPER__VAD_FILTER=true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3

  piper-tts:
    build:
      context: ./piper-tts
      dockerfile: Dockerfile
    container_name: localvoice-piper-tts
    ports:
      - "0.0.0.0:8000:8000"
    volumes:
      - piper-models:/models/piper
    environment:
      - PIPER_VOICE=${PIPER_VOICE:-en_US-lessac-medium}
      - PIPER_DATA_DIR=/models/piper
    deploy:
      resources:
        limits:
          memory: 512m
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3

  parler-tts:
    build:
      context: ./parler-tts
      dockerfile: Dockerfile
    container_name: localvoice-parler-tts
    profiles:
      - quality-tts
    ports:
      - "0.0.0.0:8001:8001"
    volumes:
      - parler-models:/models
    environment:
      - MODEL_NAME=${PARLER_MODEL:-parler-tts/parler_tts_mini_v0.1}
      - MODEL_CACHE_DIR=/models
      - DEVICE=${PARLER_DEVICE:-cuda}
      - SAMPLE_RATE=24000
      - TTS_DESCRIPTION=${PARLER_DESCRIPTION:-A female speaker delivers a slightly expressive and animated speech.}
      - OMP_NUM_THREADS=${PARLER_THREADS:-6}
      - MKL_NUM_THREADS=${PARLER_THREADS:-6}
      - OPENBLAS_NUM_THREADS=${PARLER_THREADS:-6}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      start_period: 300s
      retries: 3

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: localvoice-web
    ports:
      - "0.0.0.0:7001:7001"
    volumes:
      - ./data:/data
    environment:
      - PORT=7001
      - THREECX_FQDN=${THREECX_FQDN:-}
      - THREECX_CLIENT_ID=${THREECX_CLIENT_ID:-}
      - THREECX_CLIENT_SECRET=${THREECX_CLIENT_SECRET:-}
      - LOCALVOICE_STT_URL=http://whisper-stt:8000
      - LOCALVOICE_PIPER_URL=http://piper-tts:8000
      - LOCALVOICE_PARLER_URL=http://parler-tts:8001
      - LOCALVOICE_KOKORO_URL=http://kokoro-tts:8880
      - LOCALVOICE_DIAR_URL=http://diarization:8090
      - DB_PATH=/data/3cx.db3
      - RECORDINGS_DIR=/data/recordings
    depends_on:
      - whisper-stt
      - piper-tts
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"fetch('http://localhost:7001/').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  kokoro-tts:
    image: ghcr.io/remsky/kokoro-fastapi-gpu:latest
    container_name: localvoice-kokoro-tts
    ports:
      - "8880:8880"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8880/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  diarization:
    build:
      context: ./diarization
      dockerfile: Dockerfile
    container_name: localvoice-diarization
    ports:
      - "0.0.0.0:8090:8090"
    volumes:
      - ./data:/data
      - diarization-models:/models
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - OMP_NUM_THREADS=${DIAR_THREADS:-4}
      - MKL_NUM_THREADS=${DIAR_THREADS:-4}
      - DEVICE=${DIAR_DEVICE:-cuda}
      - PORT=8090
      - DB_PATH=/data/voices.db3
      - ENROLLMENTS_DIR=/data/enrollments
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 30s
      timeout: 10s
      start_period: 300s
      retries: 3

  3cx-sync:
    build:
      context: ./3cx-sync
      dockerfile: Dockerfile
    container_name: localvoice-3cx-sync
    volumes:
      - ./data:/data
    environment:
      - THREECX_FQDN=${THREECX_FQDN:-}
      - THREECX_CLIENT_ID=${THREECX_CLIENT_ID:-}
      - THREECX_CLIENT_SECRET=${THREECX_CLIENT_SECRET:-}
      - LOCALVOICE_STT_URL=http://whisper-stt:8000
      - LOCALVOICE_DIAR_URL=http://diarization:8090
      - DB_PATH=/data/3cx.db3
      - RECORDINGS_DIR=/data/recordings
      - SYNC_CRON_SCHEDULE=${SYNC_CRON_SCHEDULE:-*/5 * * * *}
      - SYNC_ON_START=${SYNC_ON_START:-false}
    depends_on:
      - whisper-stt
    restart: unless-stopped


volumes:
  whisper-models:
  piper-models:
  parler-models:
  diarization-models:
